<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas PaaS - Cloud Computing</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        text-align: center;
        padding: 50px;
      }
      .container {
        background-color: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        color: #000; /* Warna hitam untuk versi pertama */
      }
      .version {
        display: inline-block;
        padding: 15px 25px;
        background-color: #ff4d4f; /* Warna merah untuk versi pertama */
        color: white;
        border-radius: 5px;
        font-weight: bold;
        font-size: 1.2em;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Pembuktian PaaS & Otomatisasi</h1>
      <p>Tugas Mata Kuliah Cloud Computing</p>
      <p>
        Aplikasi ini di-hosting menggunakan <strong>Vercel</strong> dan
        terhubung dengan <strong>GitHub</strong>.
      </p>

      <div class="version">Status: Versi 3.0</div>
    </div>
  </body>
</html>
